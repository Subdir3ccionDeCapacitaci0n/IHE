<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Firmas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3e7d3; /* arena */
      padding: 20px;
      margin: 0;
    }

    h2 { color: #6b1d3a; text-align:center; }

    .login, .panel {
      max-width: 650px;
      margin: 40px auto;
      padding: 28px 30px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .login input {
      width: 100%;
      padding: 10px 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #d8c3a5;
      font-size: 14px;
    }

    .login button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      background: #6b1d3a;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .cerrar {
      background: #a94442;
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      color: white;
      cursor: pointer;
    }

    .seccion h3 {
      color: #6b1d3a;
      border-bottom: 2px solid #6b1d3a;
      padding-bottom: 4px;
      margin-bottom: 10px;
    }

    .card {
      background: #f9f4ec;
      padding: 14px 16px;
      margin: 12px 0;
      border-radius: 10px;
      border-left: 6px solid #6b1d3a;
    }

    .card button {
      margin-top: 8px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #6b1d3a;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .card .formato-btn {
      background: #0b5ed7;
      margin-left: 6px;
    }

    .card b { display: block; margin-bottom: 6px; }

    @media (max-width: 480px) {
      .login, .panel { padding: 20px; margin: 20px 10px; }
      .card { font-size: 14px; padding: 12px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <h2>Acceso Firmas</h2>
  <input id="usuario" placeholder="Usuario (TANIA o MARI)">
  <input id="password" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
  <p id="estadoLogin"></p>
</div>

<!-- PANEL -->
<div class="panel" id="panelBox" style="display:none;">
  <div class="topbar">
    <h2>Panel de Firmas</h2>
    <button class="cerrar" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>

  <div class="seccion">
    <h3>🕒 Pendientes de tu firma</h3>
    <div id="listaPendientes"></div>
  </div>

  <div class="seccion">
    <h3>✅ Ya firmados</h3>
    <div id="listaFirmados"></div>
  </div>
</div>

<script src="scriptf.js?v=2"></script>
</body>
</html>
